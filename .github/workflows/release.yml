name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get merge PR description
        id: pr_body
        run: |
          MERGE_COMMIT=$(git log --merges -1 --format="%H")
          PR_NUM=$(gh pr list --state merged --search "$MERGE_COMMIT" --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUM" ]; then
            gh pr view "$PR_NUM" --json body -q '.body' > release_notes.md
          else
            echo "Release ${{ github.ref_name }}" > release_notes.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
